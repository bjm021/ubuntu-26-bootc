# ubuntu-blscfg: BLS boot-entry generator (replaces blscfg module)
#
# blscfg.mod is not shipped by Ubuntu's grub-efi-amd64-bin package.
# This script replicates its behaviour using only built-in GRUB commands
# plus the 'regexp' module.
#
# Layout assumptions (set by grub-static-pre.cfg before we run):
#   $root  = boot partition  (e.g. hd0,gpt3)
#            contains /ostree/default-<hash>/vmlinuz-<kver>
#                 and /loader/entries/ostree-1.conf   (BLS entry)
#                 and /boot -> .                      (self-symlink)
#
# Strategy:
#  1. Source the BLS entry with stubs for non-GRUB keywords (title/version/
#     options) so we capture the 'options' line in $__bls_opts.
#     The real 'linux'/'initrd' commands execute and pre-load the kernel
#     without options — this is harmless because step 4's menuentry replaces
#     the loader with the correct options.
#  2. Extract the deployment hash from $__bls_opts (ostree= argument).
#  3. Scan ($root)/ostree/default-<hash>/ for the vmlinuz-<kver> filename.
#  4. Create a menuentry that passes the full options line to the kernel.

set __bls_title="Ubuntu"
set __bls_opts=""
set __bls_hash=""
set __bls_kver=""

# Step 1: capture BLS options
function title   { set __bls_title="$*"; }
function version { set _nop="$*"; }
function options { set __bls_opts="$*"; }

if [ -f ($root)/loader/entries/ostree-1.conf ]; then
  source ($root)/loader/entries/ostree-1.conf
fi

# Step 2: extract deployment hash from options
regexp -s __bls_hash '/default/([0-9a-f]+)/0' "$__bls_opts"

# Step 3: find kernel version in the deployment directory
if [ -n "$__bls_hash" ]; then
  for __f in ($root)/ostree/default-${__bls_hash}/vmlinuz-*; do
    if [ -f "$__f" ]; then
      regexp -s __bls_kver '/vmlinuz-(.+)$' "$__f"
      break
    fi
  done
fi

# Step 4: create boot menu entry
if [ -n "$__bls_hash" ] && [ -n "$__bls_kver" ] && [ -n "$__bls_opts" ]; then
  menuentry "$__bls_title" {
    linux  /ostree/default-${__bls_hash}/vmlinuz-${__bls_kver} ${__bls_opts} console=ttyS0,115200
    initrd /ostree/default-${__bls_hash}/initramfs-${__bls_kver}.img
  }
  set default="0"
  set timeout="5"
fi
