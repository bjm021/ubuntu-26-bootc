# ubuntu-blscfg: BLS boot-entry generator (replaces blscfg module)
#
# blscfg.mod is not shipped by Ubuntu's grub-efi-amd64-bin package.
# This script replicates its behaviour using only built-in GRUB commands
# plus the 'regexp' module.
#
# Layout assumptions (set by grub-static-pre.cfg before we run):
#   $root  = boot partition  (e.g. hd0,gpt3)
#            contains /ostree/default-<hash>/vmlinuz-<kver>
#                 and /loader/entries/ostree-{1,2}.conf   (BLS entries)
#                 and /boot -> .                          (self-symlink)
#
# Ostree creates one BLS entry per deployment (newest first):
#   ostree-2.conf = pending / new deployment  (exists only after an upgrade)
#   ostree-1.conf = current / rollback deployment
#
# Strategy: prefer ostree-2.conf (pending) when it exists; fall back to
# ostree-1.conf (current). Extract the ostree= path from the options line
# to locate the matching kernel on the boot partition.

set __bls_title="Ubuntu"
set __bls_opts=""
set __bls_hash=""
set __bls_kver=""

# Stub functions so sourcing the BLS file only captures what we need.
# The real 'linux'/'initrd' commands in the BLS file execute harmlessly
# outside a menuentry block and are overridden by the menuentry below.
function title   { set __bls_title="$*"; }
function version { set _nop="$*"; }
function options { set __bls_opts="$*"; }

# Prefer ostree-2.conf (pending deployment created by finalize-staged)
# over ostree-1.conf (rollback / currently booted deployment).
if [ -f ($root)/loader/entries/ostree-2.conf ]; then
  source ($root)/loader/entries/ostree-2.conf
elif [ -f ($root)/loader/entries/ostree-1.conf ]; then
  source ($root)/loader/entries/ostree-1.conf
fi

# Extract boot checksum from ostree=/ostree/boot.N/default/<hash>/<serial>.
regexp -s __bls_hash '/default/([0-9a-f]+)/[0-9]+' "$__bls_opts"

# Find kernel version in the boot deployment directory.
if [ -n "$__bls_hash" ]; then
  for __f in ($root)/ostree/default-${__bls_hash}/vmlinuz-*; do
    if [ -f "$__f" ]; then
      regexp -s __bls_kver '/vmlinuz-(.+)$' "$__f"
      break
    fi
  done
fi

# Build the boot menu entry.
if [ -n "$__bls_hash" ] && [ -n "$__bls_kver" ] && [ -n "$__bls_opts" ]; then
  menuentry "$__bls_title" {
    linux  /ostree/default-${__bls_hash}/vmlinuz-${__bls_kver} ${__bls_opts}
    initrd /ostree/default-${__bls_hash}/initramfs-${__bls_kver}.img
  }
  set default="0"
  set timeout="5"
fi
